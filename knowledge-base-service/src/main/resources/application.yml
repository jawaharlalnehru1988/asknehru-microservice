server:
  port: 8082

spring:
  application:
    name: knowledge-base-service
  datasource:
    url: jdbc:postgresql://localhost:5432/demoappdb
    username: demoappuser
    password: demoapp123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1

auth:
  jwt:
    issuer: asknehru-auth
    secret: ASKNEHRU_CHANGE_THIS_SECRET_TO_BASE64_OR_LONG_RANDOM_TEXT_1234567890
    access-expiry-seconds: 3600
    refresh-expiry-seconds: 1209600

asknehru:
  base-url: https://api.asknehru.com
  shared-upload-dir: /var/www/asknehru-platform/media/audio

llm:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini
  base-url: https://api.openai.com/v1/chat/completions

