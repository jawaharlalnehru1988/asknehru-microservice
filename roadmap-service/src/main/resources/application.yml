server:
  port: 8083

spring:
  application:
    name: roadmap-service
  datasource:
    url: jdbc:postgresql://localhost:5432/demoappdb
    username: demoappuser
    password: demoapp123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: roadmap-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

auth:
  jwt:
    issuer: asknehru-auth
    secret: ASKNEHRU_CHANGE_THIS_SECRET_TO_BASE64_OR_LONG_RANDOM_TEXT_1234567890
    access-expiry-seconds: 3600
    refresh-expiry-seconds: 1209600

asknehru:
  base-url: https://api.asknehru.com
  shared-upload-dir: /var/www/asknehru-platform/media/audio
