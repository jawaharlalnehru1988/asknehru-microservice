spring:
  application:
    name: asknehru-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/demoappdb
    username: demoappuser
    password: demoapp123
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    ignore-migration-patterns: "*:missing"
    validate-on-migrate: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: roadmap-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  ai:
    openai:
      api-key: ${llm.api-key}
      chat:
        options:
          model: ${llm.model}
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
server:
  port: 8085
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
auth:
  jwt:
    issuer: asknehru-auth
    secret: ASKNEHRU_CHANGE_THIS_SECRET_TO_BASE64_OR_LONG_RANDOM_TEXT_1234567890
    access-expiry-seconds: 3600
    refresh-expiry-seconds: 1209600
asknehru:
  base-url: https://api.asknehru.com
  shared-upload-dir: /var/www/asknehru-platform/media/audio
  yoga-image-upload-dir: /var/www/asknehru-platform/media/yoga-poses
  yoga-audio-upload-dir: /var/www/asknehru-platform/media/yoga-audio
  yoga-video-upload-dir: /var/www/asknehru-platform/media/yoga-video

llm:
  api-key: ${LLM_API_KEY:${OPENAI_API_KEY:}}
  model: ${LLM_MODEL:gpt-4o-mini}
  base-url: ${LLM_BASE_URL:https://api.openai.com/v1/chat/completions}
  request-timeout: ${LLM_REQUEST_TIMEOUT:30}
  max-retries: ${LLM_MAX_RETRIES:2}
  retry-backoff-seconds: ${LLM_RETRY_BACKOFF_SECONDS:0.5}

interview:
  max-questions: ${INTERVIEW_MAX_QUESTIONS:10}
